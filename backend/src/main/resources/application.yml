server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: ayurveda-platform
  
  profiles:
    active: simple  # Change to 'simple' for Shifa-only mode (no multi-tenant)

  # Single Database Configuration - SHIFA ONLY (Simplified)
  datasource:
    url: jdbc:mysql://localhost:3306/shifa_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata&useUnicode=true&characterEncoding=UTF-8
    username: root
    password: root@123
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: shifa-pool
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 20000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  flyway:
    enabled: false  # Disabled - tables already created manually

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# JWT Configuration
app:
  jwt:
    secret: YXl1cnZlZGFQbGF0Zm9ybVNlY3JldEtleUZvckpXVFRva2VuR2VuZXJhdGlvbjIwMjZTZWN1cmU=
    access-token-expiration-ms: 86400000    # 24 hours
    refresh-token-expiration-ms: 604800000  # 7 days

  cors:
    allowed-origins: http://localhost:4200
    allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
    allowed-headers: "*"
    allow-credentials: true

  # Tenant Database Connection Pool defaults
  tenant:
    datasource:
      hikari:
        maximum-pool-size: 5
        minimum-idle: 2
        idle-timeout: 30000
        connection-timeout: 20000

# Logging
logging:
  level:
    root: INFO
    com.ayurveda.platform: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Springdoc OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
