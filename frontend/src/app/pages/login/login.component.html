<div class="login-container">
  <!-- Background Pattern -->
  <div class="login-bg">
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>
  </div>

  <!-- Login Card -->
  <div class="login-card glass-panel animate-fade-in">
    <!-- Logo & Branding -->
    <div class="login-header">
      <div class="login-logo">
        <img src="/images/shifa/logo.png" alt="Shifa Ayurveda" class="login-logo-img" style="height:56px;object-fit:contain;">
      </div>
      <h1 class="login-title">Ayurveda Platform</h1>
      <p class="login-subtitle">Multi-Tenant Order &amp; Dispatch Management</p>
    </div>

    <!-- Error Message -->
    <div class="login-error" *ngIf="errorMessage">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
        <path d="M8 1a7 7 0 100 14A7 7 0 008 1zM7.25 4.5h1.5v4h-1.5v-4zm0 5.5h1.5v1.5h-1.5V10z"/>
      </svg>
      {{ errorMessage }}
    </div>

    <!-- Login Form -->
    <form (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <div class="input-wrapper">
          <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          <input
            type="text"
            id="username"
            class="form-control with-icon"
            placeholder="Enter your username"
            [(ngModel)]="username"
            name="username"
            autocomplete="username"
            [disabled]="isLoading"
          />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="input-wrapper">
          <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0110 0v4"/>
          </svg>
          <input
            type="password"
            id="password"
            class="form-control with-icon"
            placeholder="Enter your password"
            [(ngModel)]="password"
            name="password"
            autocomplete="current-password"
            [disabled]="isLoading"
          />
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-lg w-full login-btn" [disabled]="isLoading">
        <span class="spinner" *ngIf="isLoading"></span>
        <span *ngIf="!isLoading">Sign In</span>
        <span *ngIf="isLoading">Authenticating...</span>
      </button>
    </form>

    <div class="login-footer">
      <p>Secure multi-tenant platform</p>
    </div>
  </div>
</div>
