server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: shifa-ayurveda

  # Single Database Configuration - Shifa Only
  datasource:
    url: jdbc:mysql://localhost:3306/shifa_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata&useUnicode=true&characterEncoding=UTF-8
    username: root
    password: root@123
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: shifa-pool
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 20000
      max-lifetime: 1800000

  jpa:
    hibernate:
      # 'update' lets Hibernate create any missing entity tables/columns on
      # startup (additive only - never drops). This keeps the single-client
      # 'simple' setup self-healing so a missing table can't block startup.
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  flyway:
    enabled: false  # Disabled - schema managed by Hibernate ddl-auto in simple mode

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:noreply@shifa.com}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
    test-connection: false

# JWT Configuration (Disabled for storefront)
app:
  jwt:
    secret: YXl1cnZlZGFQbGF0Zm9ybVNlY3JldEtleUZvckpXVFRva2VuR2VuZXJhdGlvbjIwMjZTZWN1cmU=
    access-token-expiration-ms: 86400000
    refresh-token-expiration-ms: 604800000

  razorpay:
    key-id: rzp_test_PLACEHOLDER
    key-secret: PLACEHOLDER_SECRET
    currency: INR

  mail:
    from: ${MAIL_FROM:noreply@shifa.com}
    enabled: ${MAIL_ENABLED:false}
    company-name: Shifa Ayurveda
    store-url: http://localhost:4200/store

  cors:
    allowed-origins: http://localhost:4200
    allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
    allowed-headers: "*"
    allow-credentials: true

# Logging
logging:
  level:
    root: INFO
    com.ayurveda.platform: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Springdoc OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
